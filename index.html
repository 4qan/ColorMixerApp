*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --card-shadow: rgba(100,120,200,0.08);
  --text: #2d3250;
  --text-soft: #7a7fa0;
  --accent: #6c5ce7;
  --danger: #ff6b6b;
  --radius: 24px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  touch-action: manipulation;
}

/* Main scrollable container */
.app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}

/* === HEADER === */
.header {
  padding: 16px 20px 8px;
  text-align: center;
  flex-shrink: 0;
  position: relative;
}
.header h1 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.header h1 .emoji { font-style: normal; }
.rainbow-text {
  background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #5f27cd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* === MIXING AREA (top card) === */
.mix-card {
  margin: 4px 16px 8px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: 0 2px 16px var(--card-shadow);
  padding: 20px 16px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

/* Result circle */
.result-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e0e0e0, #c8c8c8);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  z-index: 2;
}
.result-circle.active {
  box-shadow: 0 8px 32px var(--glow-color, rgba(0,0,0,0.15));
}
.result-circle .placeholder {
  font-size: 40px;
  opacity: 0.4;
  transition: opacity 0.3s;
}
.result-circle.active .placeholder { opacity: 0; display: none; }
.result-circle .circle-label {
  display: none;
  font-size: 15px;
  font-weight: 800;
  text-align: center;
  padding: 0 10px;
  line-height: 1.2;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  z-index: 3;
  position: relative;
}
.result-circle.active .circle-label { display: block; }

.result-info {
  margin-top: 10px;
  text-align: center;
  min-height: 42px;
}
.result-name {
  font-size: 20px;
  font-weight: 800;
  line-height: 1.2;
}
.result-hex {
  font-size: 13px;
  color: var(--text-soft);
  font-weight: 600;
  margin-top: 1px;
}

/* Selected colors row (the "equation") */
.mix-equation {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
  min-height: 44px;
  width: 100%;
}
.mix-equation .empty-msg {
  font-size: 14px;
  color: var(--text-soft);
  font-weight: 700;
}
.eq-color {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  position: relative;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  animation: pop-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  flex-shrink: 0;
}
.eq-color:active { transform: scale(0.8); }
@keyframes pop-in {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
.eq-color .x-badge {
  position: absolute;
  top: -5px; right: -5px;
  width: 18px; height: 18px;
  background: var(--danger);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 900;
  color: white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.eq-plus {
  font-size: 18px;
  font-weight: 900;
  color: var(--text-soft);

/* Responsive: slightly larger on bigger phones */

<body>

<div class="app">
  <!-- Header -->
  <div class="header">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="9" cy="8" r="2.5" fill="currentColor"/><circle cx="15" cy="16" r="2.5" fill="currentColor"/></svg>
      </button>
      <button class="save-btn" id="saveBtn" onclick="saveCurrentColor()" title="Save Color">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="clear-btn" id="clearBtn" onclick="clearAll()" title="Start Over">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 1 3 6.7"/><polyline points="3 7 3 13 9 13"/></svg>
      </button>

<!-- Weights Bottom Sheet -->

    <div class="weights-title">Adjust Amounts</div>

<script>
// === COLOR DATA ===
const BASIC = [
  { name: 'Red',    hex: '#e50000' },
  { name: 'Blue',   hex: '#0343df' },
  { name: 'Yellow', hex: '#ffff14' },
  { name: 'Green',  hex: '#15b01a' },
  { name: 'Orange', hex: '#f97306' },
  { name: 'Purple', hex: '#7e1e9c' },
  { name: 'Pink',   hex: '#ff81c0' },
  { name: 'White',  hex: '#ffffff' },
  { name: 'Black',  hex: '#000000' },
  { name: 'Brown',  hex: '#653700' },
];

const EXTRA = [
  { name: 'Cyan',      hex: '#00ffff' },
  { name: 'Magenta',   hex: '#c20078' },
  { name: 'Lime',      hex: '#aaff32' },
  { name: 'Teal',      hex: '#029386' },
  { name: 'Indigo',    hex: '#380282' },
  { name: 'Coral',     hex: '#fc5a50' },
  { name: 'Gold',      hex: '#dbb40c' },
  { name: 'Navy',      hex: '#01153e' },
  { name: 'Salmon',    hex: '#ff796c' },
  { name: 'Violet',    hex: '#9a0eea' },
  { name: 'Olive',     hex: '#6e750e' },
  { name: 'Maroon',    hex: '#650021' },
  { name: 'Sky Blue',  hex: '#75bbfd' },
  { name: 'Peach',     hex: '#ffb07c' },
  { name: 'Mint',      hex: '#9ffeb0' },
  { name: 'Lavender',  hex: '#c79fef' },
  { name: 'Crimson',   hex: '#8c000f' },
  { name: 'Turquoise', hex: '#06c2ac' },
  { name: 'Amber',     hex: '#feb308' },
  { name: 'Rose',      hex: '#cf6275' },
];

const ALL_COLORS = [...BASIC, ...EXTRA];

// === STATE ===
let selected = []; // { name, hex, weight, id }
let idCounter = 0;

// === HELPERS ===
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}
function luminance(r,g,b) { return r*0.299 + g*0.587 + b*0.114; }

function nameColor(r, g, b) {
  // Nearest-neighbor match against 891 XKCD crowd-sourced color names
  let closest = null, minDist = Infinity;
  for (const c of XKCD) {
    const cr = parseInt(c.h.slice(1,3),16);
    const cg = parseInt(c.h.slice(3,5),16);
    const cb = parseInt(c.h.slice(5,7),16);
    const d = (r-cr)**2 + (g-cg)**2 + (b-cb)**2;
    if (d < minDist) { minDist = d; closest = c.n; }
  }
  return closest;
}

// === COLOR MIXING (Mixbox spectral pigment model) ===
// Uses Mixbox (Sochorova & Jamriska, 2021) which decomposes colors into
// pigment concentrations and mixes via Kubelka-Munk theory, then converts
// back to RGB. Produces physically accurate paint-like mixing results.

function mixColors() {
  if (!selected.length) return null;
  if (selected.length === 1) {
    const [r,g,b] = hexToRgb(selected[0].hex);
    return { r, g, b, hex: selected[0].hex, name: selected[0].name };
  }
  const total = selected.reduce((s,c) => s + c.weight, 0);
  if (total === 0) return null;
  const latent = new Array(mixbox.LATENT_SIZE).fill(0);
  for (const c of selected) {
    const [cr,cg,cb] = hexToRgb(c.hex);
    const l = mixbox.rgbToLatent([cr, cg, cb]);
    const w = c.weight / total;
    for (let i = 0; i < latent.length; i++) latent[i] += l[i] * w;
  }
  const [r, g, b] = mixbox.latentToRgb(latent);
  const hex = rgbToHex(r, g, b);
  return { r, g, b, hex, name: nameColor(r, g, b) };
}

// === ACTIONS ===
function addColor(color, evt) {
  selected.push({ ...color, weight: 1, id: ++idCounter });
  update();
  if (evt) spawnSparkles(evt, color.hex);
}

function removeById(id) {
  selected = selected.filter(c => c.id !== id);
  update();
}

function clearAll() {
  selected = [];
  update();
  closeWeights();
}

function setWeight(id, val) {
  const c = selected.find(s => s.id === id);
  if (c) { c.weight = Number(val); update(); }
}

// === RENDER ===
function update() {
  const mix = mixColors();
  const circle = document.getElementById('resultCircle');
  const nameEl = document.getElementById('resultName');
  const hexEl = document.getElementById('resultHex');

  const circleLabel = document.getElementById('circleLabel');

  if (mix) {
    circle.style.background = mix.hex;
    circle.style.setProperty('--glow-color', mix.hex + '40');
    circle.style.boxShadow = `0 8px 32px ${mix.hex}50`;
    circle.classList.add('active');
    // Squish animation
    circle.classList.remove('squish');
    void circle.offsetWidth; // reflow
    circle.classList.add('squish');
    // Text contrast
    const textColor = luminance(mix.r, mix.g, mix.b) > 140 ? '#2d3250' : '#ffffff';
    circleLabel.textContent = mix.name;
    circleLabel.style.color = textColor;
    nameEl.textContent = mix.name;
    nameEl.style.color = '';
    hexEl.textContent = mix.hex.toUpperCase();
    // Burst rays
    triggerBurst(mix.hex);
  } else {
    circle.style.background = 'linear-gradient(135deg, #e0e0e0, #c8c8c8)';
    circle.style.boxShadow = 'none';
    circle.classList.remove('active');
    circleLabel.textContent = '';
    nameEl.textContent = '';
    hexEl.textContent = '';
  }

  // Equation row
  const eq = document.getElementById('mixEquation');
  if (!selected.length) {
    eq.innerHTML = '<span class="empty-msg">Tap colors to start mixing!</span>';
  } else {
    let html = '';
    selected.forEach((c, i) => {
      if (i > 0) html += '<span class="eq-plus">+</span>';
      html += `<div class="eq-color" style="background:${c.hex}" onclick="removeById(${c.id})" title="Remove ${c.name}">
        <span class="x-badge">&times;</span>
      </div>`;
    });
    if (selected.length >= 2 && mix) {
      html += `<span class="eq-equals">=</span>`;
      html += `<div class="eq-result-mini" style="background:${mix.hex}"></div>`;
    }
    eq.innerHTML = html;
  }

  // Save & Clear buttons
  const hasMix = selected.length >= 2 && mix;
  document.getElementById('saveBtn').classList.toggle('show', hasMix);
  document.getElementById('clearBtn').classList.toggle('show', selected.length > 0);

  // Update orb states
  document.querySelectorAll('.color-orb').forEach(orb => {
    const hex = orb.dataset.hex;
    const inMix = selected.some(s => s.hex === hex);
    orb.classList.toggle('in-mix', inMix);
  });

  // Weights FAB
  document.getElementById('weightsInlineBtn').classList.toggle('show', selected.length >= 2);

  // Update weights sheet if open
  if (document.getElementById('weightsSheet').classList.contains('open')) {
    renderWeights();
  }
}

function renderWeights() {
  const el = document.getElementById('weightsContent');
  el.innerHTML = selected.map(c => `
    <div class="w-row">
      <div class="w-swatch" style="background:${c.hex}"></div>
      <div class="w-name">${c.name}</div>
      <input type="range" class="w-slider" min="0" max="10" step="1" value="${c.weight}"
        oninput="setWeight(${c.id}, this.value)">
      <div class="w-val">${c.weight}x</div>
    </div>
  `).join('');
}

function openWeights() {
  renderWeights();
  document.getElementById('weightsSheet').classList.add('open');
  document.getElementById('weightsBackdrop').classList.add('open');
}
function closeWeights() {
  document.getElementById('weightsSheet').classList.remove('open');
  document.getElementById('weightsBackdrop').classList.remove('open');
}

// === PALETTE BUILD ===
function buildGrid(colors, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = colors.map(c => `
    <div class="color-cell" onclick="addColor({name:'${c.name}',hex:'${c.hex}'}, event)">
      <div class="color-orb" style="background:${c.hex}" data-hex="${c.hex}">
        <div class="check">&#10003;</div>
      </div>
      <div class="color-label">${c.name}</div>
    </div>
  `).join('');
}

function toggleExtra() {
  const btn = document.getElementById('expandBtn');
  const panel = document.getElementById('extraPalette');
  btn.classList.toggle('open');
  panel.classList.toggle('open');
  btn.textContent = btn.classList.contains('open') ? 'Less Colors ' : 'More Colors ';
  const arrow = document.createElement('span');
  arrow.className = 'arrow';
  arrow.textContent = '▼';
  btn.appendChild(arrow);
}

// === FUN EFFECTS ===
function spawnSparkles(evt, hex) {
  const rect = document.getElementById('resultCircle').getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 5 + Math.random() * 8;
    const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.5;
    const dist = 50 + Math.random() * 40;
    s.style.cssText = `
      width:${size}px;height:${size}px;background:${hex};
      left:${cx}px;top:${cy}px;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 600);
  }
}

function triggerBurst(hex) {
  const burst = document.getElementById('starBurst');
  burst.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const ray = document.createElement('div');
    ray.className = 'star-ray';
    ray.style.background = hex;
    ray.style.transform = `rotate(${i * 30}deg) translateY(-50px)`;
    ray.style.animationDelay = `${i * 20}ms`;
    burst.appendChild(ray);
    setTimeout(() => ray.remove(), 600);
  }
}

// === SAVED COLORS (localStorage, rendered inside extra palette) ===
function getSaved() {
  try { return JSON.parse(localStorage.getItem('savedColors') || '[]'); }
  catch { return []; }
}

function setSaved(colors) {
  localStorage.setItem('savedColors', JSON.stringify(colors));
  renderSaved();
}

function saveCurrentColor() {
  const mix = mixColors();
  if (!mix) return;
  const saved = getSaved();
  if (saved.some(c => c.hex.toLowerCase() === mix.hex.toLowerCase())) return;
  saved.push({ name: mix.name, hex: mix.hex });
  setSaved(saved);

  // Auto-expand "More Colors" if collapsed
  const btn = document.getElementById('expandBtn');
  const panel = document.getElementById('extraPalette');
  if (!btn.classList.contains('open')) {
    btn.classList.add('open');
    panel.classList.add('open');
    btn.textContent = 'Less Colors ';
    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = '\u25BC';
    btn.appendChild(arrow);
  }

  // Pulse the newly saved color
  requestAnimationFrame(() => {
    const el = document.querySelector(`.saved-cell[data-hex="${mix.hex}"]`);
    if (el) {
      el.classList.add('saved-pulse');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      setTimeout(() => el.classList.remove('saved-pulse'), 700);
    }
  });

  // Brief checkmark feedback on save button
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.classList.add('saved');
  saveBtn.querySelector('svg').style.display = 'none';
  saveBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  setTimeout(() => {
    saveBtn.classList.remove('saved');
    saveBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  }, 800);
}

function deleteSaved(hex, e) {
  e.stopPropagation();
  setSaved(getSaved().filter(c => c.hex !== hex));
}

function renderSaved() {
  const saved = getSaved();
  const panel = document.getElementById('extraPalette');

  // Remove existing saved elements
  panel.querySelectorAll('.saved-divider, .saved-cell').forEach(el => el.remove());

  if (!saved.length) return;

  // Add divider + saved colors at the end of the extra palette
  const divider = document.createElement('div');
  divider.className = 'saved-divider';
  divider.innerHTML = '<span>Saved</span>';
  panel.appendChild(divider);

  saved.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'saved-cell color-cell';
    cell.dataset.hex = c.hex;
    cell.innerHTML = `
      <span class="x-badge">&times;</span>
      <div class="color-orb" style="background:${c.hex}" data-hex="${c.hex}">
        <div class="check">&#10003;</div>
      </div>
      <div class="color-label">${c.name}</div>`;
    cell.querySelector('.x-badge').addEventListener('click', e => deleteSaved(c.hex, e));
    cell.addEventListener('click', () => addColor({ name: c.name, hex: c.hex }, event));
    panel.appendChild(cell);
  });
}

// === INIT ===
buildGrid(BASIC, 'basicGrid');
buildGrid(EXTRA, 'extraPalette');
renderSaved();
update();

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
